; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:arduino_nano_esp32]
platform = espressif32
board = arduino_nano_esp32
framework = arduino
monitor_speed = 115200
lib_deps =
	adafruit/Adafruit GFX Library @ ^1.11.11
	adafruit/Adafruit ILI9341 @ ^1.6.1
	z3t0/IRremote @ ^4.7.1

; Debug environments for quick per-component tests. Build with `pio run -e <env>`.
[env:debug_i2c]
extends = arduino_nano_esp32
build_flags = -DTEST_I2C
src_filter = +<debug_tests/i2c/*> +<include/*> +<lib/*>

[env:debug_pga2311]
extends = arduino_nano_esp32
build_flags = -DTEST_PGA2311
src_filter = +<debug_tests/pga2311/*> +<include/*> +<lib/*>

[env:debug_mas6116]
extends = arduino_nano_esp32
build_flags = -DTEST_MAS6116
src_filter = +<debug_tests/mas6116/*> +<include/*> +<lib/*>

[env:debug_audio]
extends = arduino_nano_esp32
build_flags = -DTEST_AUDIO
src_filter = +<debug_tests/audio_output/*> +<include/*> +<lib/*>

[env:debug_wifi]
extends = arduino_nano_esp32
build_flags = -DTEST_WIFI
src_filter = +<debug_tests/wifi/*> +<include/*> +<lib/*>
